<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebPro — Mis Proyectos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#080d14; --bg1:#0f1923; --bg2:#152030; --bg3:#1e2d40;
  --bg4:#243348; --border:#2a3f57; --border2:#34526e;
  --accent:#38bdf8; --accent2:#818cf8; --accent3:#34d399;
  --warn:#fbbf24; --danger:#f87171;
  --text:#e2eaf4; --muted:#6b8aab; --dim:#3d5a78;
  --panel:270px; --tb:48px; --cb:74px; --r:6px;
  --font:'DM Sans',ui-sans-serif,system-ui,sans-serif;
}
html, body { height:100%; font-family:var(--font); background:var(--bg0); color:var(--text); -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:4px; }

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
#screen-home   { position:fixed; inset:0; overflow-y:auto; display:flex; flex-direction:column; background:var(--bg0); }
#screen-editor { position:fixed; inset:0; overflow:hidden; display:none; }

/* ═══════════════════════════════════════════
   HOME
═══════════════════════════════════════════ */
.home-topbar {
  height:52px; background:var(--bg1); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:14px;
  flex-shrink:0; position:sticky; top:0; z-index:100;
}
.logo { font-size:13px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:7px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.ht-spacer { flex:1; }
.ht-btn {
  height:30px; padding:0 13px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); color:var(--text); font-size:11px; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center; gap:5px; transition:all .15s;
}
.ht-btn:hover { background:var(--bg4); border-color:var(--border2); }
.ht-btn.new { background:var(--accent); border-color:var(--accent); color:#0c1a2b; font-weight:700; }
.home-body { flex:1; padding:32px 24px 48px; max-width:1060px; width:100%; margin:0 auto; }
.home-section-title { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:18px; }
.projects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }
.project-card {
  background:var(--bg1); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; display:flex; flex-direction:column; cursor:pointer; transition:all .18s;
}
.project-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,.4); }
.project-thumb { height:120px; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:38px; border-bottom:1px solid var(--border); color:var(--dim); }
.project-info { padding:11px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
.project-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.project-name-input { font-size:13px; font-weight:600; color:var(--text); background:var(--bg3); border:1px solid var(--accent); border-radius:4px; padding:2px 6px; width:100%; font-family:var(--font); outline:none; }
.project-date { font-size:10px; color:var(--muted); }
.project-actions { display:flex; gap:5px; padding:8px 10px; border-top:1px solid var(--border); background:var(--bg2); }
.proj-btn { flex:1; height:26px; background:var(--bg3); border:1px solid var(--border); border-radius:5px; color:var(--muted); font-size:10px; font-family:var(--font); cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:3px; }
.proj-btn:hover { background:var(--bg4); color:var(--text); }
.proj-btn.open-btn:hover { background:var(--accent); border-color:var(--accent); color:#0c1a2b; font-weight:600; }
.proj-btn.del-btn:hover  { background:var(--danger); border-color:var(--danger); color:#fff; }
.card-new { min-height:200px; border:2px dashed var(--border); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:all .18s; color:var(--dim); }
.card-new:hover { border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,.04); }
.card-new-icon { font-size:30px; }
.card-new-label { font-size:12px; font-weight:600; }
.home-loading, .home-empty { text-align:center; color:var(--muted); font-size:13px; padding:60px 0; grid-column:1/-1; line-height:2; }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:9999; display:flex; align-items:center; justify-content:center; }
.modal-box { background:var(--bg1); border:1px solid var(--border2); border-radius:12px; padding:24px; width:300px; display:flex; flex-direction:column; gap:12px; box-shadow:0 20px 60px rgba(0,0,0,.6); }
.modal-title { font-size:15px; font-weight:700; }
.modal-desc  { font-size:12px; color:var(--muted); line-height:1.65; }
.modal-btns  { display:flex; gap:8px; margin-top:4px; }
.modal-btn   { flex:1; height:34px; border-radius:7px; font-size:12px; font-family:var(--font); font-weight:600; cursor:pointer; border:1px solid; transition:all .15s; }
.modal-btn.cancel { background:var(--bg3); border-color:var(--border); color:var(--text); }
.modal-btn.cancel:hover { background:var(--bg4); }
.modal-btn.confirm-del { background:var(--danger); border-color:var(--danger); color:#fff; }

/* ═══════════════════════════════════════════
   EDITOR — APP LAYOUT
═══════════════════════════════════════════ */
#app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Top Bar ── */
#topbar {
  height:var(--tb); background:var(--bg1); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 8px; gap:5px;
  flex-shrink:0; z-index:200; position:relative;
  /* SCROLL HORIZONTAL para ver todos los botones en móvil */
  overflow-x:auto; overflow-y:hidden;
}
#topbar::-webkit-scrollbar { height:0; }
.logo-small { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:-.2px; white-space:nowrap; flex-shrink:0; }
.sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.tb-spacer { flex:1; min-width:8px; }
.tb-btn {
  height:30px; padding:0 9px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); color:var(--text); font-size:11px; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all .15s; flex-shrink:0; user-select:none; touch-action:manipulation;
}
.tb-btn:hover { background:var(--bg4); border-color:var(--border2); }
.tb-btn:active { transform:scale(.95); }
.tb-btn.on   { background:var(--accent); border-color:var(--accent); color:#0c1a2b; font-weight:600; }
.tb-btn.save { background:var(--accent3); border-color:var(--accent3); color:#065f46; font-weight:600; }
.tb-btn.prev { background:var(--warn); border-color:var(--warn); color:#78350f; font-weight:600; }
.tb-btn.back { background:var(--bg2); border-color:var(--border); color:var(--muted); }
.tb-btn:disabled { opacity:.35; cursor:default; transform:none; }
.tb-btn.icon { padding:0 8px; font-size:13px; }
.proj-name-badge { font-size:12px; font-weight:600; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
.sync-badge { font-size:10px; color:var(--dim); display:flex; align-items:center; gap:4px; white-space:nowrap; flex-shrink:0; }
.sync-badge.saving { color:var(--warn); }
.sync-badge.saved  { color:var(--accent3); }
.sync-badge.error  { color:var(--danger); }

/* ── Component Bar ── */
#compbar {
  height:var(--cb); background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px; padding:0 8px;
  overflow-x:auto; overflow-y:hidden; flex-shrink:0;
  /* Scrollbar visible para que el usuario sepa que puede deslizar */
  scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
}
#compbar::-webkit-scrollbar { height:4px; }
#compbar::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
/* Indicador visual de que hay más elementos */
#compbar-wrap { position:relative; flex-shrink:0; }
.comp-card {
  min-width:60px; height:56px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; font-size:9px; color:var(--muted);
  cursor:pointer; transition:all .15s; flex-shrink:0; user-select:none;
  touch-action:manipulation; letter-spacing:.3px; text-transform:uppercase;
}
.comp-card:hover { background:var(--bg4); border-color:var(--accent); color:var(--text); transform:translateY(-1px); }
.comp-card:active { transform:scale(.92); }
.ci { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
.c1{background:#38bdf8}.c2{background:#34d399}.c3{background:#818cf8}
.c4{background:#fbbf24}.c5{background:#f87171}.c6{background:#06b6d4}
.c7{background:#64748b}.c8{background:#a78bfa}.c9{background:#fb923c}.c10{background:#4ade80}

/* ── Workspace ── */
#workspace { flex:1; position:relative; overflow:hidden; display:flex; }
#canvas-area { flex:1; padding:12px; overflow:auto; position:relative; }
#canvas {
  /* Canvas ahora tiene tamaño mínimo real para poder hacer scroll hacia abajo */
  min-width:600px; min-height:800px; width:100%; background:#fff; border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.45); position:relative;
}
#canvas.grid {
  background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);
  background-size:20px 20px;
}
#canvas-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
#canvas-hint .hi { font-size:46px; opacity:.12; }
#canvas-hint .ht { font-size:12px; color:#aaa; margin-top:10px; line-height:1.6; }
#canvas-hint.gone { display:none; }

/* ═══════════════════════════════════════════
   ELEMENTOS EN EL CANVAS
═══════════════════════════════════════════ */
.el {
  position:absolute; cursor:grab;
  /* IMPORTANTE: touch-action:none para que el drag funcione en móvil */
  touch-action:none;
  /* Borde de selección */
  outline:2px solid transparent; outline-offset:1px;
  border-radius:3px; min-width:50px; min-height:30px;
  user-select:none;
  /* Área clickeable más generosa — sin padding que afecte layout */
}
.el:active { cursor:grabbing; }
.el.sel { outline-color:#38bdf8; }

/* ── Toolbar flotante del elemento ── */
.el-ctrl {
  position:absolute; top:-42px; left:0;
  background:var(--bg1); border:1px solid var(--border2);
  border-radius:8px; display:none; align-items:center;
  gap:2px; padding:3px; z-index:1100; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
}
.sel .el-ctrl { display:flex; }

/* Si el elemento está muy arriba, mostrar toolbar abajo */
.el-ctrl.flip { top:auto; bottom:-42px; }

.c-btn {
  height:30px; min-width:30px; padding:0 7px; border:none; border-radius:6px;
  font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:3px;
  transition:filter .15s; touch-action:manipulation; white-space:nowrap; font-family:var(--font); font-weight:600;
}
.c-btn:hover   { filter:brightness(1.2); }
.c-btn:active  { transform:scale(.9); }
.c-auto   { background:var(--warn); color:#78350f; }
.c-edit   { background:var(--accent2); color:#fff; }
.c-dupe   { background:var(--dim); color:#fff; }
.c-del    { background:var(--danger); color:#fff; }
.c-upload { background:#0ea5e9; color:#fff; }
.c-img-opts { background:#7c3aed; color:#fff; }
/* Resize handle */
.rh {
  position:absolute; bottom:-5px; right:-5px; width:16px; height:16px;
  background:var(--accent); border-radius:4px; cursor:nwse-resize;
  display:none; z-index:1100; touch-action:none;
  box-shadow:0 2px 8px rgba(56,189,248,.5); border:2px solid #fff;
}
.sel .rh { display:block; }
.el-c { width:100%; height:100%; overflow:hidden; }
[contenteditable]:focus { outline:2px dashed rgba(56,189,248,.5); outline-offset:2px; border-radius:2px; }

/* ═══════════════════════════════════════════
   HERO — OPCIONES DE IMAGEN
═══════════════════════════════════════════ */
.hero-img-opts {
  position:absolute; top:-42px; right:0;
  background:var(--bg1); border:1px solid var(--border2);
  border-radius:8px; display:none; align-items:center;
  gap:2px; padding:3px; z-index:1101;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
}
.sel .hero-img-opts { display:flex; }
.io-btn {
  height:28px; min-width:28px; padding:0 6px; border:none; border-radius:5px;
  font-size:10px; cursor:pointer; background:var(--bg3); color:var(--muted); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:2px; transition:all .15s;
  touch-action:manipulation; font-family:var(--font);
}
.io-btn:hover { background:var(--bg4); color:var(--text); }
.io-btn.on { background:var(--accent); border-color:var(--accent); color:#0c1a2b; font-weight:700; }

/* ═══════════════════════════════════════════
   FLOATING TEXT TOOLBAR
═══════════════════════════════════════════ */
#text-toolbar {
  position:fixed; background:var(--bg1); border:1px solid var(--border2);
  border-radius:10px; padding:4px; display:none; align-items:center;
  gap:2px; z-index:2000; box-shadow:0 8px 32px rgba(0,0,0,.7);
  flex-wrap:wrap; max-width:320px;
}
#text-toolbar.show { display:flex; }
.tt-btn {
  height:28px; min-width:28px; padding:0 6px; border:none; border-radius:6px;
  font-size:11px; cursor:pointer; background:var(--bg3); color:var(--muted);
  border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
  transition:all .15s; touch-action:manipulation; font-family:var(--font);
}
.tt-btn:hover { background:var(--bg4); color:var(--text); }
.tt-btn.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }
.tt-sep { width:1px; height:20px; background:var(--border); margin:0 2px; flex-shrink:0; }
#tt-color { width:26px; height:26px; border:1px solid var(--border2); border-radius:5px; padding:1px; background:var(--bg3); cursor:pointer; }
#tt-size { width:40px; height:26px; background:var(--bg3); border:1px solid var(--border2); border-radius:5px; color:var(--text); font-size:10px; font-family:var(--font); text-align:center; padding:0 2px; }

/* ═══════════════════════════════════════════
   PROPERTIES PANEL
═══════════════════════════════════════════ */
#panel {
  width:var(--panel); height:100%; background:var(--bg1);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
  position:absolute; right:0; top:0; z-index:100; overflow:hidden;
}
#panel.open { transform:translateX(0); }
#ph { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#ph-title { font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
#ph-title span { color:var(--accent2); }
#ph-close { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:2px 6px; border-radius:4px; }
#ph-close:hover { background:var(--bg3); color:var(--text); }
#pb { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
.ps { background:var(--bg2); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
.ps-h { padding:8px 10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); background:var(--bg3); cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; transition:background .15s; }
.ps-h:hover { background:var(--bg4); }
.ps-b { padding:10px; display:flex; flex-direction:column; gap:8px; }
.ps-b.collapsed { display:none; }
.pr { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
.pr label { width:56px; font-size:10px; flex-shrink:0; }
.pr input[type=number], .pr input[type=text], .pr input[type=url], .pr select {
  flex:1; background:var(--bg3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); padding:4px 7px; font-size:11px; font-family:var(--font); height:27px;
}
.pr input:focus, .pr select:focus { outline:none; border-color:var(--accent); }
.pr input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.pr input[type=color] { width:27px; height:27px; border:1px solid var(--border2); border-radius:4px; padding:2px; background:var(--bg3); cursor:pointer; flex-shrink:0; }
.pv { font-size:10px; color:var(--dim); width:32px; text-align:right; flex-shrink:0; }
.bg-opts { display:flex; flex-direction:column; gap:8px; }
.btn-row { display:flex; gap:4px; flex-wrap:wrap; }
.btn-row button {
  flex:1; padding:5px 2px; background:var(--bg3); border:1px solid var(--border);
  border-radius:4px; color:var(--muted); font-size:10px; font-family:var(--font);
  cursor:pointer; transition:all .15s; touch-action:manipulation; min-width:40px;
}
.btn-row button:hover { background:var(--bg4); color:var(--text); }
.btn-row button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.fmt-row { display:flex; flex-wrap:wrap; gap:4px; }
.fb { width:27px; height:27px; background:var(--bg3); border:1px solid var(--border); border-radius:4px; color:var(--muted); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; touch-action:manipulation; }
.fb:hover { background:var(--bg4); color:var(--text); }
.fb.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }

/* ═══════════════════════════════════════════
   PREVIEW MODAL
═══════════════════════════════════════════ */
#preview { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9000; flex-direction:column; align-items:center; justify-content:center; gap:12px; display:none; }
#preview.show { display:flex; }
#pf { width:94%; max-width:960px; height:80vh; background:#fff; border-radius:8px; border:none; box-shadow:0 20px 80px rgba(0,0,0,.6); }
.pm-bar { display:flex; gap:8px; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(60px);
  background:var(--bg1); color:var(--text); padding:8px 18px;
  border-radius:20px; font-size:12px; z-index:9999;
  transition:transform .3s ease; border:1px solid var(--border2);
  pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   INPUT FILE OCULTO (fix subida imagen)
═══════════════════════════════════════════ */
#img-file-input {
  position:fixed; left:-9999px; top:-9999px;
  opacity:0; width:1px; height:1px;
}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     HOME
════════════════════════════════════ -->
<div id="screen-home">
  <header class="home-topbar">
    <div class="logo"><div class="logo-dot"></div>WebPro</div>
    <div class="ht-spacer"></div>
    <button class="ht-btn new" onclick="createProject()">＋ Nuevo Proyecto</button>
  </header>
  <div class="home-body">
    <div class="home-section-title">Mis Proyectos</div>
    <div class="projects-grid" id="projects-grid">
      <div class="home-loading">Cargando proyectos…</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     EDITOR
════════════════════════════════════ -->
<div id="screen-editor">
<div id="app">

  <!-- TOP BAR — con overflow-x para scroll en móvil -->
  <header id="topbar">
    <button class="tb-btn back" id="btn-home">← Proyectos</button>
    <div class="sep"></div>
    <span class="proj-name-badge" id="proj-name-badge">Sin título</span>
    <div class="sep"></div>

async function loadProjects() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '<div class="home-loading">Cargando proyectos…</div>';
  const { data, error } = await db.from('projects').select('id,name,updated_at,created_at').order('updated_at',{ascending:false});
  if (error) { grid.innerHTML = '<div class="home-empty">⚠️ No se pudo conectar a Supabase.</div>'; return; }
  grid.innerHTML = '';
  if (!data.length) {
    const e = document.createElement('div'); e.className = 'home-empty';
    e.innerHTML = 'Aún no tienes proyectos.<br>Crea el primero.'; grid.appendChild(e);
  } else { data.forEach(p => grid.appendChild(buildProjectCard(p))); }
  const nc = document.createElement('div'); nc.className = 'card-new';
  nc.innerHTML = '<div class="card-new-icon">＋</div><div class="card-new-label">Nuevo Proyecto</div>';
  nc.addEventListener('click', createProject); grid.appendChild(nc);
}

function buildProjectCard(proj) {
  const card = document.createElement('div'); card.className = 'project-card'; card.dataset.id = proj.id;
  const emojis = ['🗂','🌐','✨','🚀','🎨','💼','🏠','📱','🛍','📰'];
  const icon = emojis[proj.id.charCodeAt(0) % emojis.length];
  card.innerHTML = `
    <div class="project-thumb">${icon}</div>
    <div class="project-info">
      <div class="project-name" id="pname-${proj.id}">${esc(proj.name)}</div>
      <div class="project-date">Editado ${timeAgo(proj.updated_at)}</div>
    </div>
    <div class="project-actions">
      <button class="proj-btn open-btn" data-action="open">▶ Abrir</button>
      <button class="proj-btn" data-action="rename">✏ Renombrar</button>
      <button class="proj-btn del-btn" data-action="delete">🗑</button>
    </div>`;
  card.querySelector('[data-action="open"]').addEventListener('click',e=>{e.stopPropagation();openProject(proj);});
  card.querySelector('[data-action="rename"]').addEventListener('click',e=>{e.stopPropagation();startRename(proj,card);});
  card.querySelector('[data-action="delete"]').addEventListener('click',e=>{e.stopPropagation();askDelete(proj);});
  card.addEventListener('click',()=>openProject(proj));
  return card;
}

function startRename(proj, card) {
  const nameEl = card.querySelector(`#pname-${proj.id}`);
  const input = document.createElement('input'); input.className='project-name-input'; input.value=proj.name;
  nameEl.replaceWith(input); input.focus(); input.select();
  const finish = async () => {
    const n = input.value.trim() || proj.name; proj.name = n;
    const span = document.createElement('div'); span.className='project-name'; span.id=`pname-${proj.id}`; span.textContent=n;
    input.replaceWith(span);
    await db.from('projects').update({name:n,updated_at:new Date().toISOString()}).eq('id',proj.id);
  };
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.value=proj.name;input.blur();}});
}

async function createProject() {
  const name = prompt('Nombre del proyecto:','Mi Página Web'); if(!name) return;
  const {data,error} = await db.from('projects').insert({name:name.trim(),elements:[]}).select().single();
  if(error){toast2('⚠ Error: '+error.message);return;}
  openProject(data);
}

async function openProject(proj) {
  const {data,error} = await db.from('projects').select('*').eq('id',proj.id).single();
  if(error){toast2('⚠ Error al cargar proyecto');return;}
  currentProject = {id:data.id,name:data.name};
  document.getElementById('proj-name-badge').textContent = data.name;
  canvas.querySelectorAll('.el').forEach(e=>e.remove());
  desel(); closePanel(); hideTextToolbar();
  hist.length=0; hIdx=-1; elN=0; zC=100; isDirty=false;
  hint.classList.remove('gone'); updHistBtns(); setSyncBadge('ready');
  if(data.elements&&data.elements.length>0) restoreFromArray(data.elements);
  save();
  showScreen('editor');
  toast2(`📂 ${data.name} abierto`);
}

async function goHome() {
  clearTimeout(syncTimer); if(isDirty) await syncToSupabase();
  currentProject=null; canvas.querySelectorAll('.el').forEach(e=>e.remove());
  desel(); closePanel(); hideTextToolbar();
  hist.length=0; hIdx=-1; elN=0; zC=100; isDirty=false;
  hint.classList.remove('gone'); updHistBtns();
  showScreen('home'); loadProjects();
}

function askDelete(proj) {
  pendingDeleteId = proj.id;
  document.getElementById('modal-desc').textContent = `¿Eliminar "${proj.name}"? Esta acción no se puede deshacer.`;
  document.getElementById('modal-confirm').style.display='flex';
}
function closeConfirm() { pendingDeleteId=null; document.getElementById('modal-confirm').style.display='none'; }
async function confirmDelete() {
  if(!pendingDeleteId) return; closeConfirm();
  const {data:assets} = await db.from('assets').select('storage_path').eq('project_id',pendingDeleteId);
  if(assets&&assets.length) await db.storage.from(BUCKET).remove(assets.map(a=>a.storage_path));
  await db.from('projects').delete().eq('id',pendingDeleteId);
  toast2('🗑 Proyecto eliminado'); loadProjects();
}

   SYNC
════════════════════════════ */
function scheduleSyncToSupabase() { clearTimeout(syncTimer); syncTimer=setTimeout(syncToSupabase,1500); }
async function syncToSupabase() {
  if(!currentProject||!isDirty) return;
  setSyncBadge('saving');
  const elements = [...canvas.querySelectorAll('.el')].map(el=>({
    id:el.id, type:el.dataset.type, st:el.getAttribute('style'), ct:el.querySelector('.el-c').innerHTML
  }));
  const {error} = await db.from('projects').update({elements,updated_at:new Date().toISOString()}).eq('id',currentProject.id);
  if(error){setSyncBadge('error');return;}
  isDirty=false; setSyncBadge('saved');
}
function setSyncBadge(s) {
  const b=document.getElementById('sync-badge'); b.className='sync-badge '+s;
  if(s==='saving')b.textContent='◌ Guardando…';
  if(s==='saved') b.textContent='✓ Guardado';
  if(s==='error') b.textContent='⚠ Error';
  if(s==='ready') b.textContent='● Listo';
}
document.getElementById('btn-save').addEventListener('click',async()=>{clearTimeout(syncTimer);await syncToSupabase();});

/* ════════════════════════════
   SUBIR IMAGEN — FIX MÓVIL/IOS
   El truco: el input file está siempre
   en el DOM y lo activamos desde aquí
════════════════════════════ */
let _uploadTarget = null; // el elemento al que se subirá
const imgFileInput = document.getElementById('img-file-input');

imgFileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file || !_uploadTarget) { imgFileInput.value=''; return; }

  if(file.size > 5*1024*1024) { toast2('⚠ Imagen máx. 5MB'); imgFileInput.value=''; return; }
  if(!currentProject)         { toast2('⚠ Primero abre un proyecto'); imgFileInput.value=''; return; }

  toast2('📤 Subiendo imagen…'); setSyncBadge('saving');

  const ext  = file.name.split('.').pop().toLowerCase();
  const path = `${currentProject.id}/${Date.now()}.${ext}`;

  const { error: upErr } = await db.storage.from(BUCKET).upload(path, file, {
    contentType: file.type, upsert: true
  });

  if(upErr) {
    console.error('Upload error:', upErr);
    toast2('⚠ Error al subir: ' + upErr.message);
    setSyncBadge('error'); imgFileInput.value=''; return;
  }

  const { data: { publicUrl } } = db.storage.from(BUCKET).getPublicUrl(path);
  const el = _uploadTarget;

  // Detectar si es un hero (tiene opciones de imagen) o imagen simple
  const imgOpts = el.querySelector('.hero-img-opts');
  const elc = el.querySelector('.el-c');

  if(el.dataset.type === 'hero') {
    // Para hero: aplicar como imagen de fondo del hero

    if(heroBg) {
      heroBg.style.backgroundImage = `url('${publicUrl}')`;
      heroBg.style.backgroundSize  = 'cover';
      heroBg.style.backgroundPosition = 'center center';
      heroBg.dataset.imgUrl = publicUrl;
    }
  } else {
    // Para imagen simple
    elc.innerHTML = `<img src="${publicUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block" draggable="false">`;
  }

  await db.from('assets').insert({
    project_id:currentProject.id, filename:file.name,
    storage_path:path, public_url:publicUrl,
    size:file.size, mime_type:file.type
  });

  save(); toast2('✅ Imagen subida');
  imgFileInput.value = '';
  _uploadTarget = null;
});

/* ════════════════════════════
   ADD ELEMENT
════════════════════════════ */
function addEl(comp) {
  if(elN===0) hint.classList.add('gone');
  elN++;
  const el = document.createElement('div');
  el.className='el'; el.id='e'+Date.now(); el.dataset.type=comp.type;

  // Toolbar del elemento
  el.innerHTML = `<div class="el-ctrl">
    <button class="c-btn c-auto" data-a="auto" title="Auto-posicionar">✦ Auto</button>
    <button class="c-btn c-edit" data-a="edit" title="Propiedades">✏ Props</button>
    <button class="c-btn c-dupe" data-a="dupe" title="Duplicar">⧉</button>
    <button class="c-btn c-del"  data-a="del"  title="Eliminar">✕</button>
  </div>
  <div class="el-c">${getTpl(comp.type)}</div>
  <div class="rh"></div>`;

  // Para imagen: agregar botón de subir
  if(comp.type==='image') {
    el.querySelector('.el-ctrl').insertAdjacentHTML('afterbegin',
      `<button class="c-btn c-upload" data-a="upload" title="Subir imagen">📤 Subir</button>`
    );
  }

  // Para hero: agregar opciones de imagen de fondo
  if(comp.type==='hero') {
    el.querySelector('.el-ctrl').insertAdjacentHTML('afterbegin',
      `<button class="c-btn c-upload" data-a="upload-hero" title="Imagen de fondo">🖼 Foto</button>
       <button class="c-btn c-img-opts" data-a="hero-del-img" title="Quitar imagen">🚫 Img</button>`
    );
    // Opciones de ajuste de imagen (posición)
    el.innerHTML += `<div class="hero-img-opts">
      <span style="font-size:9px;color:var(--muted);padding:0 4px">Foto:</span>
      <button class="io-btn on" data-fit="cover"   onclick="setHeroFit(this,'cover')">Llenar</button>
      <button class="io-btn"    data-fit="contain" onclick="setHeroFit(this,'contain')">Contener</button>
      <span style="font-size:9px;color:var(--muted);padding:0 4px;margin-left:4px">Posición:</span>
      <button class="io-btn on" data-pos="center center" onclick="setHeroPos(this,'center center')">Centro</button>
      <button class="io-btn"    data-pos="top center"    onclick="setHeroPos(this,'top center')">Arriba</button>
      <button class="io-btn"    data-pos="bottom center" onclick="setHeroPos(this,'bottom center')">Abajo</button>
      <button class="io-btn"    data-pos="center left"   onclick="setHeroPos(this,'center left')">Izq</button>
      <button class="io-btn"    data-pos="center right"  onclick="setHeroPos(this,'center right')">Der</button>
      <span style="font-size:9px;color:var(--muted);padding:0 4px;margin-left:4px">Overlay:</span>
      <input type="range" id="overlay-range-${el.id}" min="0" max="80" value="0" style="width:60px;accent-color:var(--accent)" oninput="setHeroOverlay(this)">
    </div>`;
  }

  const cx = sn(Math.max(0,(canvas.clientWidth-comp.w)/2+canvas.scrollLeft));
  const cy = sn(Math.max(0,(canvas.clientHeight-comp.h)/2+canvas.scrollTop));
  el.style.cssText = `left:${cx}px;top:${cy}px;width:${comp.w}px;height:${comp.h}px;z-index:${zC++}`;

  canvas.appendChild(el);
  wireCtrl(el,comp);
  initDrag(el);
  // FIX: selección inmediata con un solo clic sobre el elemento
  select(el);
  save();
}

/* ════════════════════════════
   HERO — OPCIONES IMAGEN
════════════════════════════ */
function setHeroFit(btn, fit) {
  const el = btn.closest('.el'); if(!el) return;
  const bg = el.querySelector('.hero-bg'); if(!bg) return;
  bg.style.backgroundSize = fit;
  btn.closest('.hero-img-opts').querySelectorAll('[data-fit]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); save();
}

function setHeroPos(btn, pos) {
  const el = btn.closest('.el'); if(!el) return;
  const bg = el.querySelector('.hero-bg'); if(!bg) return;
  bg.style.backgroundPosition = pos;
  btn.closest('.hero-img-opts').querySelectorAll('[data-pos]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); save();
}

function setHeroOverlay(input) {
  const el = input.closest('.el'); if(!el) return;
  const overlay = el.querySelector('.hero-overlay'); if(!overlay) return;
  const v = input.value;
  overlay.style.background = `rgba(0,0,0,${v/100})`;
  save();
}

/* ════════════════════════════
   WIRE CONTROLS
════════════════════════════ */
function wireCtrl(el, comp) {
  el.querySelectorAll('[data-a]').forEach(btn => {
    // Prevenir que el drag se active al tocar botones
    btn.addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); });
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const a = btn.dataset.a;
      if(a==='upload')      triggerImageUpload(el);
      if(a==='upload-hero') triggerImageUpload(el);
      if(a==='hero-del-img') {
        const bg = el.querySelector('.hero-bg');
        if(bg) { bg.style.backgroundImage='none'; bg.dataset.imgUrl=''; }
        save(); toast2('Imagen de fondo eliminada');
      }
      if(a==='del')  delEl(el);
      if(a==='edit') openPanel(el);
      if(a==='auto') autoPos(el);
      if(a==='dupe') dupeEl(el,comp);
    });
  });

  // También prevenir propagación en hero-img-opts
  const imgOpts = el.querySelector('.hero-img-opts');
  if(imgOpts) {
    imgOpts.addEventListener('pointerdown', e => e.stopPropagation());
    imgOpts.addEventListener('click', e => e.stopPropagation());
  }

  // Doble clic para editar texto
  el.addEventListener('dblclick', e => {
    if(e.target.isContentEditable || e.target.closest('[contenteditable]')) return;
    const te = el.querySelector('[contenteditable]');
    if(te) { te.focus(); select(el); }
  });

  // FIX: UN SOLO CLIC selecciona el elemento sin batallar
  el.addEventListener('pointerdown', e => {
    if(e.target.dataset.a) return;
    if(e.target === el.querySelector('.rh')) return;
    if(e.target.closest('.hero-img-opts')) return;
    select(el);
  });
}

function delEl(el) {
  if(selEl===el){selEl=null;closePanel();hideTextToolbar();}
  el.remove(); elN=Math.max(0,elN-1);
  if(elN===0) hint.classList.remove('gone');
  save();
}

function dupeEl(el,comp) {
  const nc = comp || COMPS.find(c=>c.type===el.dataset.type) || {type:el.dataset.type,w:el.offsetWidth,h:el.offsetHeight};
  const ne = document.createElement('div'); ne.className='el'; ne.id='e'+Date.now(); ne.dataset.type=el.dataset.type;
  ne.innerHTML = `<div class="el-ctrl"><button class="c-btn c-auto" data-a="auto">✦ Auto</button><button class="c-btn c-edit" data-a="edit">✏ Props</button><button class="c-btn c-dupe" data-a="dupe">⧉</button><button class="c-btn c-del" data-a="del">✕</button></div><div class="el-c">${el.querySelector('.el-c').innerHTML}</div><div class="rh"></div>`;
  const nx=sn((parseInt(el.style.left)||0)+20);
  const ny=sn((parseInt(el.style.top)||0)+20);
  ne.style.cssText=`left:${nx}px;top:${ny}px;width:${el.style.width};height:${el.style.height};z-index:${zC++}`;
  canvas.appendChild(ne); wireCtrl(ne,nc); initDrag(ne); select(ne); elN++; save();
}

/* ════════════════════════════
   SNAP
════════════════════════════ */
function sn(v) { return snapOn ? Math.round(v/SNAP)*SNAP : Math.round(v); }

/* ════════════════════════════
   SELECCIÓN — FIX: ahora con
   pointerdown para respuesta inmediata
════════════════════════════ */
function select(el) {
  if(selEl===el) return;
  desel(); selEl=el; el.classList.add('sel');
  el.style.zIndex=zC++;
  if(panel.classList.contains('open')) loadPanel(el);
  // Ajustar toolbar si el elemento está muy arriba
  const ctrl = el.querySelector('.el-ctrl');
  if(ctrl) {
    const rect = el.getBoundingClientRect();
    ctrl.classList.toggle('flip', rect.top < 60);
  }
}

function desel() {
  if(selEl){ selEl.classList.remove('sel'); selEl=null; }
}

// Click en el canvas vacío = deseleccionar
canvas.addEventListener('pointerdown', e => {
  if(!e.target.closest('.el')) { desel(); closePanel(); hideTextToolbar(); }
});

/* ════════════════════════════
   DRAG & RESIZE
════════════════════════════ */
function initDrag(el) {
  const rh = el.querySelector('.rh');
  let dg=false, sx,sy,sl,st;

  el.addEventListener('pointerdown', e => {
    if(e.target.dataset.a) return;
    if(e.target.isContentEditable || e.target.closest('[contenteditable]')) return;
    if(e.target===rh || e.target.closest('.rh')) return;
    if(e.target.closest('.hero-img-opts')) return;
    e.preventDefault(); e.stopPropagation();
    dg=true;
    try{el.setPointerCapture(e.pointerId);}catch(_){}
    sx=e.clientX; sy=e.clientY;
    sl=parseInt(el.style.left)||0; st=parseInt(el.style.top)||0;
  });

  el.addEventListener('pointermove', e => {
    if(!dg) return; e.preventDefault();
    el.style.left = Math.max(0,sn(sl+(e.clientX-sx)))+'px';
    el.style.top  = Math.max(0,sn(st+(e.clientY-sy)))+'px';
    if(panel.classList.contains('open')&&selEl===el){
      document.getElementById('px').value=parseInt(el.style.left);
      document.getElementById('py').value=parseInt(el.style.top);
    }
    // Auto-expandir canvas si el elemento sale por abajo
    expandCanvas(el);
  });

  el.addEventListener('pointerup', e => {
    if(!dg) return; dg=false;
    try{el.releasePointerCapture(e.pointerId);}catch(_){}
    save();
  });
  el.addEventListener('pointercancel',()=>{ dg=false; });

  let rz=false, rsx,rsy,rsw,rsh;
  rh.addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    rz=true; try{rh.setPointerCapture(e.pointerId);}catch(_){}
    rsx=e.clientX; rsy=e.clientY; rsw=el.offsetWidth; rsh=el.offsetHeight;
  });
  rh.addEventListener('pointermove', e => {
    if(!rz) return; e.preventDefault();
    const nw=sn(Math.max(50,rsw+(e.clientX-rsx)));
    const nh=sn(Math.max(28,rsh+(e.clientY-rsy)));
    el.style.width=nw+'px'; el.style.height=nh+'px';
    if(panel.classList.contains('open')&&selEl===el){
      document.getElementById('pw').value=nw;
      document.getElementById('ph2').value=nh;
    }
    expandCanvas(el);
  });
  rh.addEventListener('pointerup', e => {
    if(!rz) return; rz=false;
    try{rh.releasePointerCapture(e.pointerId);}catch(_){}
    save();
  });
  rh.addEventListener('pointercancel',()=>{ rz=false; });
}

/* ════════════════════════════
   AUTO-EXPANDIR CANVAS
   para poder agregar elementos abajo
════════════════════════════ */
function expandCanvas(el) {
  const bottom = (parseInt(el.style.top)||0) + el.offsetHeight + 60;
  if(bottom > canvas.offsetHeight) {
    canvas.style.minHeight = bottom + 'px';
  }
}

/* ════════════════════════════
   AUTO-POSITION
════════════════════════════ */
function autoPos(el) {
  const type=el.dataset.type, cw=canvas.clientWidth;
  const presets = {
    nav:    {x:0,y:0,      w:cw,h:52},
    header: {x:0,y:52,     w:cw,h:80},
    hero:   {x:0,y:0,      w:cw,h:220},
    footer: {x:0,y:-2,     w:cw,h:78},
    divider:{x:20,y:-1,    w:cw-40,h:22},
  };
  if(presets[type]) {
    const p=presets[type];
    el.style.left=p.x+'px'; el.style.width=p.w+'px'; el.style.height=p.h+'px';
    el.style.top=(p.y===-1||p.y===-2 ? (p.y===-2 ? stackBottom(el) : stackTop(el)) : p.y)+'px';
  } else {
    el.style.left='20px'; el.style.top=stackTop(el)+'px'; el.style.width=(cw-40)+'px';
  }
  if(panel.classList.contains('open')&&selEl===el) loadPanel(el);
  save(); toast2('Elemento posicionado ✦');
}

function stackTop(ex) {
  let bot=20;
  canvas.querySelectorAll('.el').forEach(e=>{
    if(e===ex) return;
    const b=(parseInt(e.style.top)||0)+e.offsetHeight;
    if(b>bot) bot=b;
  });
  return bot+8;
}

function stackBottom(ex) {
  return stackTop(ex);
}

/* ════════════════════════════
   PANEL DE PROPIEDADES
════════════════════════════ */
function openPanel(el)  { select(el); panel.classList.add('open'); loadPanel(el); }
function closePanel()   { panel.classList.remove('open'); }
document.getElementById('ph-close').addEventListener('click',closePanel);

function toggleSec(id) {
  const key=id.replace('ps-','');
  const b=document.getElementById('pb-'+key); if(!b) return;
  const isCol=b.classList.contains('collapsed');
  b.classList.toggle('collapsed',!isCol);
  const a=document.getElementById('arr-'+key); if(a) a.textContent=isCol?'▾':'▸';
}

function loadPanel(el) {
  if(!el) return;
  const cs=getComputedStyle(el);
  document.getElementById('px').value=parseInt(el.style.left)||0;
  document.getElementById('py').value=parseInt(el.style.top)||0;
  document.getElementById('pw').value=el.offsetWidth;
  document.getElementById('ph2').value=el.offsetHeight;
  const br=parseInt(cs.borderRadius)||0, bw=parseInt(cs.borderWidth)||0;
  document.getElementById('bdr').value=br; updV('bdr-v',br,'px');
  document.getElementById('bdw').value=bw; updV('bdw-v',bw,'px');
  if(cs.borderStyle!=='none') document.getElementById('bds').value=cs.borderStyle;
  const op=Math.round((parseFloat(cs.opacity)||1)*100);
  document.getElementById('opr').value=op; updV('opr-v',op,'%');
  const hasSh=cs.boxShadow!=='none';
  document.getElementById('shcb').checked=hasSh;
  document.getElementById('shrow').style.display=hasSh?'flex':'none';
  const te=el.querySelector('[contenteditable]');
  if(te) {
    const tcs=getComputedStyle(te);
    document.getElementById('fs').value=parseInt(tcs.fontSize)||14;
    try{document.getElementById('tc').value=rgbHex(tcs.color);}catch(_){}
    document.getElementById('fb-b').classList.toggle('on',parseInt(tcs.fontWeight)>=700);
    document.getElementById('fb-i').classList.toggle('on',tcs.fontStyle==='italic');
    document.getElementById('fb-u').classList.toggle('on',tcs.textDecoration.includes('underline'));
    document.getElementById('fb-s').classList.toggle('on',tcs.textDecoration.includes('line-through'));
  }
  const bg=el.style.background||'';
  if(bg.includes('gradient')) setBgTypeUI('gradient');
  else if(el.style.backgroundImage&&el.style.backgroundImage!=='none') setBgTypeUI('image');
  else if(!bg||bg==='transparent'||bg==='none') setBgTypeUI('none');
  else { setBgTypeUI('solid'); try{document.getElementById('bg-color').value=rgbHex(cs.backgroundColor);}catch(_){} }
}

function setBgType(t) {
  bgType=t; setBgTypeUI(t); if(!selEl) return;
  if(t==='none')     { selEl.style.background='transparent'; selEl.style.backgroundImage='none'; }
  else if(t==='solid')    applyBgSolid();
  else if(t==='gradient') applyGradient();
  save();
}

function setBgTypeUI(t) {
  bgType=t;
  document.querySelectorAll('#bgt-btns button').forEach(b=>b.classList.toggle('on',b.dataset.bgt===t));
  document.getElementById('bgo-solid').style.display=t==='solid'   ?'flex':'none';
  document.getElementById('bgo-grad').style.display =t==='gradient'?'flex':'none';
  document.getElementById('bgo-img').style.display  =t==='image'   ?'flex':'none';
}

function applyBgSolid() {
  if(!selEl) return;
  selEl.style.background=document.getElementById('bg-color').value;
  selEl.style.backgroundImage='none';
}

function applyGradient() {
  if(!selEl) return;
  const c1=document.getElementById('gc1').value;
  const c2=document.getElementById('gc2').value;
  const d=document.getElementById('gdir').value;
  selEl.style.background=`linear-gradient(${d},${c1},${c2})`;
}

function applyBgImg() {
  if(!selEl) return;
  const url=document.getElementById('bg-img').value.trim(); if(!url) return;
  selEl.style.backgroundImage=`url('${url}')`;
  selEl.style.backgroundSize='cover'; selEl.style.backgroundPosition='center';
  save(); toast2('Imagen de fondo aplicada');
}

function applyTypo() {
  if(!selEl) return;
  const sz=document.getElementById('fs').value;
  const co=document.getElementById('tc').value;
  const ff=document.getElementById('ff').value;
  selEl.querySelectorAll('[contenteditable]').forEach(te=>{
    te.style.fontSize=sz+'px'; te.style.color=co;
    if(ff) te.style.fontFamily=ff;
  });
}

function togFmt(cmd) {
  if(!selEl) return;
  selEl.querySelectorAll('[contenteditable]').forEach(te=>{
    const cs=getComputedStyle(te);
    if(cmd==='bold')      te.style.fontWeight=parseInt(cs.fontWeight)>=700?'normal':'700';
    if(cmd==='italic')    te.style.fontStyle=cs.fontStyle==='italic'?'normal':'italic';
    if(cmd==='underline') te.style.textDecoration=cs.textDecoration.includes('underline')?'none':'underline';
    if(cmd==='strike')    te.style.textDecoration=cs.textDecoration.includes('line-through')?'none':'line-through';
  });
  loadPanel(selEl); save();
}

function setAlign(a) {
  if(!selEl) return;
  selEl.querySelectorAll('[contenteditable]').forEach(te=>te.style.textAlign=a);
  ['fb-al','fb-ac','fb-ar'].forEach(id=>document.getElementById(id).classList.remove('on'));
  const map={left:'fb-al',center:'fb-ac',right:'fb-ar'};
  if(map[a]) document.getElementById(map[a]).classList.add('on');
  save();
}

function applyBorder() {
  if(!selEl) return;
  const r=document.getElementById('bdr').value;
  const w=document.getElementById('bdw').value;
  const s=document.getElementById('bds').value;
  const c=document.getElementById('bdc').value;
  selEl.style.borderRadius=r+'px';
  if(parseInt(w)>0){selEl.style.borderWidth=w+'px';selEl.style.borderStyle=s;selEl.style.borderColor=c;}
  else selEl.style.border='none';
}

function applyAppearance() {
  if(!selEl) return;
  selEl.style.opacity=document.getElementById('opr').value/100;
  const sh=document.getElementById('shcb').checked;
  const shc=document.getElementById('shc').value;
  document.getElementById('shrow').style.display=sh?'flex':'none';
  selEl.style.boxShadow=sh?`4px 4px 16px ${shc}55`:'none';
  selEl.style.padding=document.getElementById('padr').value+'px';
}

function applyPos() {
  if(!selEl) return;
  const x=parseInt(document.getElementById('px').value)||0;
  const y=parseInt(document.getElementById('py').value)||0;
  const w=parseInt(document.getElementById('pw').value)||50;
  const h=parseInt(document.getElementById('ph2').value)||28;
  selEl.style.left=x+'px'; selEl.style.top=y+'px';
  selEl.style.width=w+'px'; selEl.style.height=h+'px';
}

function updV(id,v,unit) { const e=document.getElementById(id); if(e) e.textContent=v+unit; }

/* ════════════════════════════
   FLOATING TEXT TOOLBAR
   Aparece al seleccionar texto
════════════════════════════ */
const textToolbar = document.getElementById('text-toolbar');
let textToolbarVisible = false;

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed || !sel.toString().trim()) {
    // No ocultar inmediatamente para no interferir con clicks en el toolbar
    return;
  }
  // Verificar que la selección es dentro de un contenteditable del canvas
  const anchor = sel.anchorNode;
  if(!anchor) return;
  const ce = anchor.parentElement?.closest('[contenteditable]');
  if(!ce || !canvas.contains(ce)) return;

  const range = sel.getRangeAt(0);
  const rect  = range.getBoundingClientRect();
  const top   = rect.top - 50;
  const left  = Math.max(8, rect.left + rect.width/2 - 150);

  textToolbar.style.top  = Math.max(10, top)+'px';
  textToolbar.style.left = left+'px';
  textToolbar.classList.add('show');
  textToolbarVisible = true;
});

function hideTextToolbar() {
  textToolbar.classList.remove('show');
  textToolbarVisible = false;
}

// Ocultar toolbar de texto cuando se hace click fuera
document.addEventListener('pointerdown', e => {
  if(!textToolbar.contains(e.target) && !e.target.closest('[contenteditable]')) {
    hideTextToolbar();
  }
});

function execCmd(cmd, value, fontSize) {
  if(cmd==='fontSize' && fontSize) {
    // Usar spanWrap para cambiar tamaño porque execCommand fontSize solo acepta 1-7
    document.execCommand('fontSize', false, '7');
    const fontElements = document.querySelectorAll('font[size="7"]');
    fontElements.forEach(f => {
      f.removeAttribute('size');
      f.style.fontSize = fontSize + 'px';
    });
    return;
  }
  if(cmd==='foreColor' && value) {
    document.execCommand('foreColor', false, value);
    return;
  }
  document.execCommand(cmd, false, null);
  save();
}

/* ════════════════════════════
   UNDO / REDO
════════════════════════════ */
function save() {
  hist.splice(hIdx+1);
  const snap = [...canvas.querySelectorAll('.el')].map(el=>({
    id:el.id, type:el.dataset.type,
    st:el.getAttribute('style'),
    ct:el.querySelector('.el-c').innerHTML,
  }));
  hist.push(JSON.stringify(snap));
  if(hist.length>MAX_H) hist.shift();
  hIdx=hist.length-1;
  updHistBtns(); isDirty=true; scheduleSyncToSupabase();
}

function restoreFromArray(data) {
  canvas.querySelectorAll('.el').forEach(e=>e.remove());
  desel(); closePanel(); hideTextToolbar();
  data.forEach(item=>{
    const comp=COMPS.find(c=>c.type===item.type)||{type:item.type,w:200,h:100};
    const el=document.createElement('div'); el.className='el'; el.id=item.id; el.dataset.type=item.type;
    el.setAttribute('style',item.st);
    el.innerHTML=`<div class="el-ctrl"><button class="c-btn c-auto" data-a="auto">✦ Auto</button><button class="c-btn c-edit" data-a="edit">✏ Props</button><button class="c-btn c-dupe" data-a="dupe">⧉</button><button class="c-btn c-del" data-a="del">✕</button></div><div class="el-c">${item.ct}</div><div class="rh"></div>`;
    // Re-agregar botones especiales al restaurar
    if(item.type==='image') {
      el.querySelector('.el-ctrl').insertAdjacentHTML('afterbegin',`<button class="c-btn c-upload" data-a="upload">📤 Subir</button>`);
    }
    if(item.type==='hero') {
      el.querySelector('.el-ctrl').insertAdjacentHTML('afterbegin',`<button class="c-btn c-upload" data-a="upload-hero">🖼 Foto</button><button class="c-btn c-img-opts" data-a="hero-del-img">🚫 Img</button>`);
      if(!el.querySelector('.hero-img-opts')) {
        el.innerHTML += `<div class="hero-img-opts"><span style="font-size:9px;color:var(--muted);padding:0 4px">Foto:</span><button class="io-btn on" data-fit="cover" onclick="setHeroFit(this,'cover')">Llenar</button><button class="io-btn" data-fit="contain" onclick="setHeroFit(this,'contain')">Contener</button><span style="font-size:9px;color:var(--muted);padding:0 4px;margin-left:4px">Posición:</span><button class="io-btn on" data-pos="center center" onclick="setHeroPos(this,'center center')">Centro</button><button class="io-btn" data-pos="top center" onclick="setHeroPos(this,'top center')">Arriba</button><button class="io-btn" data-pos="bottom center" onclick="setHeroPos(this,'bottom center')">Abajo</button><button class="io-btn" data-pos="center left" onclick="setHeroPos(this,'center left')">Izq</button><button class="io-btn" data-pos="center right" onclick="setHeroPos(this,'center right')">Der</button><span style="font-size:9px;color:var(--muted);padding:0 4px;margin-left:4px">Overlay:</span><input type="range" min="0" max="80" value="0" style="width:60px;accent-color:var(--accent)" oninput="setHeroOverlay(this)"></div>`;
      }
    }
    canvas.appendChild(el); wireCtrl(el,comp); initDrag(el);
  });
  elN=data.length;
  if(elN===0) hint.classList.remove('gone'); else hint.classList.add('gone');
  updHistBtns();
}

function undo() { if(hIdx<=0) return; hIdx--; restoreFromArray(JSON.parse(hist[hIdx])); toast2('↩ Deshecho'); isDirty=true; scheduleSyncToSupabase(); }
function redo() { if(hIdx>=hist.length-1) return; hIdx++; restoreFromArray(JSON.parse(hist[hIdx])); toast2('↪ Rehecho'); isDirty=true; scheduleSyncToSupabase(); }

function updHistBtns() {
  document.getElementById('btn-undo').disabled=hIdx<=0;
  document.getElementById('btn-redo').disabled=hIdx>=hist.length-1;
}
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);

/* Keyboard shortcuts */
document.addEventListener('keydown', e => {
  if(document.getElementById('screen-editor').style.display==='none') return;
  if(e.ctrlKey||e.metaKey) {
    if(e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
    if(e.key==='y'||(e.key==='z'&&e.shiftKey)){e.preventDefault();redo();}
    if(e.key==='s'){e.preventDefault();clearTimeout(syncTimer);syncToSupabase();}
  }
  if((e.key==='Delete'||e.key==='Backspace')&&selEl&&!document.activeElement?.isContentEditable) delEl(selEl);
  if(e.key==='Escape'){desel();closePanel();hideTextToolbar();}
  if(selEl&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    const step=e.shiftKey?20:(snapOn?SNAP:1);
    if(e.key==='ArrowLeft') selEl.style.left=(Math.max(0,parseInt(selEl.style.left)||0)-step)+'px';
    if(e.key==='ArrowRight')selEl.style.left=((parseInt(selEl.style.left)||0)+step)+'px';
    if(e.key==='ArrowUp')   selEl.style.top=(Math.max(0,parseInt(selEl.style.top)||0)-step)+'px';
    if(e.key==='ArrowDown') selEl.style.top=((parseInt(selEl.style.top)||0)+step)+'px';
    save();
  }
});

/* ════════════════════════════
   PREVIEW & EXPORT
════════════════════════════ */
function genHTML() {
  const els = canvas.querySelectorAll('.el');
  let body = '';
  els.forEach(el => {
    const s=el.style, ct=el.querySelector('.el-c').innerHTML;
    body+=`\n  <div style="position:absolute;left:${s.left};top:${s.top};width:${s.width};height:${s.height};${s.background?'background:'+s.background+';':''}${s.backgroundImage&&s.backgroundImage!=='none'?'background-image:'+s.backgroundImage+';background-size:cover;background-position:center;':''}${s.borderRadius?'border-radius:'+s.borderRadius+';':''}${s.border&&s.border!=='none'?'border:'+s.border+';':''}${s.opacity&&s.opacity!=='1'?'opacity:'+s.opacity+';':''}${s.boxShadow&&s.boxShadow!=='none'?'box-shadow:'+s.boxShadow+';':''}${s.padding?'padding:'+s.padding+';':''}z-index:${s.zIndex}">${ct}</div>`;
  });
  return `<!DOCTYPE html>\n<html lang="es">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>${currentProject?.name||'Mi Página'}</title>\n<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:ui-sans-serif,system-ui,sans-serif}.page{position:relative;width:100%;min-height:100vh}</style>\n</head>\n<body>\n<div class="page">${body}\n</div>\n</body>\n</html>`;
}

function openPreview() { document.getElementById('preview').classList.add('show'); document.getElementById('pf').srcdoc=genHTML(); }
function closePreview(){ document.getElementById('preview').classList.remove('show'); }
function doExport() {
  const html=genHTML(), blob=new Blob([html],{type:'text/html'}), url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=(currentProject?.name||'mi-pagina').toLowerCase().replace(/\s+/g,'-')+'.html';
  a.click(); URL.revokeObjectURL(url); toast2('📥 HTML descargado');
}
document.getElementById('btn-prev').addEventListener('click',openPreview);
document.getElementById('preview').addEventListener('click',e=>{ if(e.target===document.getElementById('preview')) closePreview(); });

════════════════════════════ */
function toast2(msg) {
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>toastEl.classList.remove('show'),2800);
}

/* ════════════════════════════
   HELPERS
════════════════════════════ */
function rgbHex(rgb) {
  if(!rgb||rgb==='transparent') return '#ffffff';
  const m=rgb.match(/\d+/g); if(!m||m.length<3) return '#000000';
  return '#'+m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join('');
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(dateStr) {
  const diff=Date.now()-new Date(dateStr).getTime();
  const mins=Math.floor(diff/60000);
  if(mins<1)  return 'ahora mismo';
  if(mins<60) return `hace ${mins} min`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)  return `hace ${hrs}h`;
  const days=Math.floor(hrs/24);
  if(days<30) return `hace ${days}d`;
  return new Date(dateStr).toLocaleDateString('es-MX',{day:'numeric',month:'short'});
}
