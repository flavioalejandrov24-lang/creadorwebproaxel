<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Creador Web Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ══════════════════════════════════════
   RESET & CSS VARIABLES
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#080d14; --bg1:#0f1923; --bg2:#152030; --bg3:#1e2d40;
  --bg4:#243348; --border:#2a3f57; --border2:#34526e;
  --accent:#38bdf8; --accent2:#818cf8; --accent3:#34d399;
  --warn:#fbbf24; --danger:#f87171;
  --text:#e2eaf4; --muted:#6b8aab; --dim:#3d5a78;
  --panel:260px; --tb:48px; --cb:78px; --r:6px;
  --font:'DM Sans',ui-sans-serif,system-ui,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
html,body { height:100%; overflow:hidden; font-family:var(--font); background:var(--bg0); color:var(--text); touch-action:none; -webkit-tap-highlight-color:transparent; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:4px; }

/* ══════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════ */
#app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Top Bar ── */
#topbar {
  height:var(--tb); background:var(--bg1); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 10px; gap:6px;
  flex-shrink:0; z-index:200; position:relative;
}
.logo { font-size:13px; font-weight:700; letter-spacing:-.3px; margin-right:4px; white-space:nowrap; display:flex; align-items:center; gap:6px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.tb-spacer { flex:1; }
.tb-btn {
  height:30px; padding:0 9px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); color:var(--text); font-size:11px; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all .15s; flex-shrink:0; user-select:none; touch-action:manipulation;
}
.tb-btn:hover { background:var(--bg4); border-color:var(--border2); }
.tb-btn:active { transform:scale(.95); }
.tb-btn.on { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 10px rgba(56,189,248,.35); }
.tb-btn.save { background:var(--accent3); border-color:var(--accent3); color:#065f46; font-weight:600; }
.tb-btn.prev { background:var(--warn); border-color:var(--warn); color:#78350f; font-weight:600; }
.tb-btn:disabled { opacity:.35; cursor:default; transform:none; }
.tb-btn.icon { padding:0 7px; font-size:13px; }

/* ── Component Bar ── */
#compbar {
  height:var(--cb); background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:7px; padding:0 10px;
  overflow-x:auto; overflow-y:hidden; flex-shrink:0; scrollbar-width:thin;
}
.comp-card {
  min-width:62px; height:58px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:4px; font-size:9px; color:var(--muted); cursor:pointer;
  transition:all .15s; flex-shrink:0; user-select:none; touch-action:manipulation; letter-spacing:.3px;
}
.comp-card:hover { background:var(--bg4); border-color:var(--accent); color:var(--text); }
.comp-card:active { transform:scale(.92); }
.ci { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
.c1{background:#38bdf8} .c2{background:#34d399} .c3{background:#818cf8}
.c4{background:#fbbf24} .c5{background:#f87171} .c6{background:#06b6d4}
.c7{background:#64748b} .c8{background:#a78bfa} .c9{background:#fb923c}
.c10{background:#4ade80}

/* ── Workspace ── */
#workspace { flex:1; position:relative; overflow:hidden; display:flex; }

/* ── Canvas Area ── */
#canvas-area { flex:1; padding:12px; overflow:hidden; position:relative; }
#canvas {
  width:100%; height:100%; background:#fff; border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.45); position:relative; overflow:auto;
}
#canvas.grid { background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px); background-size:20px 20px; }
#canvas-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
#canvas-hint .hi { font-size:46px; opacity:.12; }
#canvas-hint .ht { font-size:12px; color:#aaa; margin-top:10px; line-height:1.6; }
#canvas-hint.gone { display:none; }

/* ══════════════════════════════════════
   DROPPED ELEMENTS
══════════════════════════════════════ */
.el {
  position:absolute; cursor:grab; touch-action:none; /* CRITICAL */
  border:2px solid transparent; border-radius:3px;
  min-width:50px; min-height:30px;
  display:flex; align-items:center; justify-content:center;
  user-select:none; transition:border-color .1s;
}
.el:active { cursor:grabbing; }
.el.sel { border-color:#38bdf8; }
.el.sel::after {
  content:''; position:absolute; inset:-5px; border-radius:5px;
  border:1px dashed rgba(56,189,248,.35); pointer-events:none;
}

/* Controls floating bar */
.el-ctrl {
  position:absolute; top:-36px; left:50%; transform:translateX(-50%);
  background:var(--bg1); border:1px solid var(--border2);
  border-radius:7px; display:none; align-items:center;
  gap:2px; padding:3px; z-index:1100; white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.sel .el-ctrl { display:flex; }
.c-btn {
  width:27px; height:27px; border:none; border-radius:5px;
  font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:filter .15s; touch-action:manipulation;
}
.c-btn:hover { filter:brightness(1.25); }
.c-btn:active { transform:scale(.88); }
.c-auto { background:var(--warn); color:#78350f; font-size:11px; }
.c-edit { background:var(--accent2); color:#fff; }
.c-dupe { background:var(--dim); color:#fff; }
.c-del  { background:var(--danger); color:#fff; }

/* Resize handle */
.rh {
  position:absolute; bottom:-6px; right:-6px; width:14px; height:14px;
  background:var(--accent); border-radius:3px; cursor:nwse-resize;
  display:none; z-index:1100; touch-action:none;
  box-shadow:0 2px 6px rgba(56,189,248,.5);
}
.sel .rh { display:block; }

/* Element content wrapper */
.el-c { width:100%; height:100%; overflow:hidden; }
[contenteditable]:focus { outline:none; }

/* ══════════════════════════════════════
   PROPERTIES PANEL
══════════════════════════════════════ */
#panel {
  width:var(--panel); height:100%; background:var(--bg1);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
  position:absolute; right:0; top:0; z-index:100; overflow:hidden;
}
#panel.open { transform:translateX(0); }
#ph { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#ph-title { font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
#ph-title span { color:var(--accent2); }
#ph-close { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:2px 6px; border-radius:4px; }
#ph-close:hover { background:var(--bg3); color:var(--text); }
#pb { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }

/* Panel sections */
.ps { background:var(--bg2); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
.ps-h {
  padding:8px 10px; font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:.06em; color:var(--muted); background:var(--bg3);
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  user-select:none; transition:background .15s;
}
.ps-h:hover { background:var(--bg4); }
.ps-b { padding:10px; display:flex; flex-direction:column; gap:8px; }
.ps-b.collapsed { display:none; }

.pr { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
.pr label { width:56px; font-size:10px; flex-shrink:0; }
.pr input[type=number], .pr input[type=text], .pr input[type=url], .pr select {
  flex:1; background:var(--bg3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); padding:4px 7px; font-size:11px; font-family:var(--font); height:27px;
}
.pr input[type=number]:focus, .pr input[type=text]:focus, .pr input[type=url]:focus, .pr select:focus {
  outline:none; border-color:var(--accent);
}
.pr input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.pr input[type=color] { width:27px; height:27px; border:1px solid var(--border2); border-radius:4px; padding:2px; background:var(--bg3); cursor:pointer; flex-shrink:0; }
.pv { font-size:10px; color:var(--dim); width:32px; text-align:right; flex-shrink:0; }

.bg-opts { display:flex; flex-direction:column; gap:8px; }

.btn-row { display:flex; gap:4px; }
.btn-row button {
  flex:1; padding:5px 2px; background:var(--bg3); border:1px solid var(--border);
  border-radius:4px; color:var(--muted); font-size:10px; font-family:var(--font);
  cursor:pointer; transition:all .15s; touch-action:manipulation;
}
.btn-row button:hover { background:var(--bg4); color:var(--text); }
.btn-row button.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.fmt-row { display:flex; flex-wrap:wrap; gap:4px; }
.fb {
  width:27px; height:27px; background:var(--bg3); border:1px solid var(--border);
  border-radius:4px; color:var(--muted); font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; touch-action:manipulation;
}
.fb:hover { background:var(--bg4); color:var(--text); }
.fb.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }

/* ══════════════════════════════════════
   PREVIEW MODAL
══════════════════════════════════════ */
#preview {
  position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:9000;
  flex-direction:column; align-items:center; justify-content:center; gap:12px; display:none;
}
#preview.show { display:flex; }
#pf { width:92%; max-width:900px; height:78vh; background:#fff; border-radius:8px; border:none; box-shadow:0 20px 80px rgba(0,0,0,.6); }
.pm-bar { display:flex; gap:8px; }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(60px);
  background:var(--bg1); color:var(--text); padding:8px 18px;
  border-radius:20px; font-size:12px; z-index:9999;
  transition:transform .3s ease; border:1px solid var(--border2);
  pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   RULER / GUIDES (subtle)
══════════════════════════════════════ */
.guide-h, .guide-v {
  position:absolute; pointer-events:none; opacity:0; transition:opacity .2s;
  z-index:900;
}
.guide-h { left:0; right:0; height:1px; background:rgba(56,189,248,.5); }
.guide-v { top:0; bottom:0; width:1px; background:rgba(56,189,248,.5); }

/* Scrollbar for compbar */
#compbar::-webkit-scrollbar { height:3px; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══════════ TOP BAR ═══════════ -->
  <header id="topbar">
    <div class="logo"><div class="logo-dot"></div>WebPro</div>
    <div class="sep"></div>
    <button class="tb-btn icon" id="btn-undo" title="Deshacer (Ctrl+Z)" disabled>↩</button>
    <button class="tb-btn icon" id="btn-redo" title="Rehacer (Ctrl+Y)" disabled>↪</button>
    <div class="sep"></div>
    <button class="tb-btn on" id="btn-grid" title="Cuadrícula">⊞ Grilla</button>
    <button class="tb-btn on" id="btn-snap" title="Ajustar a grilla">🧲 Snap</button>
    <div class="tb-spacer"></div>
    <button class="tb-btn save" id="btn-save">💾 Guardar</button>
    <button class="tb-btn prev" id="btn-prev">👁 Preview</button>
  </header>

  <!-- ═══════════ COMPONENT BAR ═══════════ -->
  <div id="compbar"></div>

  <!-- ═══════════ WORKSPACE ═══════════ -->
  <div id="workspace">
    <div id="canvas-area">
      <div id="canvas" class="grid">
        <div id="canvas-hint">
          <div class="hi">🎨</div>
          <div class="ht">Selecciona un componente<br>en la barra superior para comenzar</div>
        </div>
      </div>
    </div>

    <!-- ═══════════ PROPERTIES PANEL ═══════════ -->
    <div id="panel">
      <div id="ph">
        <div id="ph-title"><span>✏</span> Propiedades</div>
        <button id="ph-close">✕</button>
      </div>
      <div id="pb">

        <!-- Background -->
        <div class="ps" id="ps-bg">
          <div class="ps-h" onclick="toggleSec('ps-bg')">🎨 Fondo <span id="arr-bg">▾</span></div>
          <div class="ps-b" id="pb-bg">
            <div class="btn-row" id="bgt-btns">
              <button data-bgt="solid" onclick="setBgType('solid')" class="on">Sólido</button>
              <button data-bgt="gradient" onclick="setBgType('gradient')">Degradado</button>
              <button data-bgt="image" onclick="setBgType('image')">Imagen</button>
              <button data-bgt="none" onclick="setBgType('none')">Ninguno</button>
            </div>
            <div class="bg-opts" id="bgo-solid">
              <div class="pr"><label>Color</label><input type="color" id="bg-color" value="#ffffff" oninput="applyBgSolid()"></div>
            </div>
            <div class="bg-opts" id="bgo-grad" style="display:none">
              <div class="pr"><label>Color 1</label><input type="color" id="gc1" value="#38bdf8" oninput="applyGradient()"></div>
              <div class="pr"><label>Color 2</label><input type="color" id="gc2" value="#818cf8" oninput="applyGradient()"></div>
              <div class="pr">
                <label>Dir.</label>
                <select id="gdir" onchange="applyGradient()">
                  <option value="to right">→ Derecha</option>
                  <option value="to bottom">↓ Abajo</option>
                  <option value="to bottom right">↘ Diagonal ↘</option>
                  <option value="to top right">↗ Diagonal ↗</option>
                  <option value="135deg">135°</option>
                  <option value="45deg">45°</option>
                  <option value="to top">↑ Arriba</option>
                </select>
              </div>
            </div>
            <div class="bg-opts" id="bgo-img" style="display:none">
              <div class="pr"><label>URL</label><input type="url" id="bg-img" placeholder="https://..."></div>
              <div class="btn-row"><button onclick="applyBgImg()">✓ Aplicar imagen</button></div>
            </div>
          </div>
        </div>

        <!-- Typography -->
        <div class="ps" id="ps-typo">
          <div class="ps-h" onclick="toggleSec('ps-typo')">✍ Tipografía <span id="arr-typo">▾</span></div>
          <div class="ps-b" id="pb-typo">
            <div class="pr">
              <label>Tamaño</label>
              <input type="number" id="fs" min="8" max="120" value="14" style="width:55px;flex:none" oninput="applyTypo()">
              <span class="pv">px</span>
            </div>
            <div class="pr">
              <label>Fuente</label>
              <select id="ff" onchange="applyTypo()">
                <option value="">Por defecto</option>
                <option value="'DM Sans',sans-serif">DM Sans</option>
                <option value="Georgia,serif">Georgia</option>
                <option value="'Times New Roman',serif">Times New Roman</option>
                <option value="'Courier New',monospace">Courier New</option>
                <option value="Verdana,sans-serif">Verdana</option>
                <option value="Impact,sans-serif">Impact</option>
                <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
              </select>
            </div>
            <div class="pr"><label>Color</label><input type="color" id="tc" value="#000000" oninput="applyTypo()"></div>
            <div class="fmt-row">
              <button class="fb" id="fb-b" title="Negrita" onclick="togFmt('bold')"><b>B</b></button>
              <button class="fb" id="fb-i" title="Cursiva" onclick="togFmt('italic')"><i>I</i></button>
              <button class="fb" id="fb-u" title="Subrayado" onclick="togFmt('underline')"><u>U</u></button>
              <button class="fb" id="fb-s" title="Tachado" onclick="togFmt('strike')"><s>S</s></button>
              <button class="fb" id="fb-al" title="Izquierda" onclick="setAlign('left')">◀</button>
              <button class="fb" id="fb-ac" title="Centro" onclick="setAlign('center')">■</button>
              <button class="fb" id="fb-ar" title="Derecha" onclick="setAlign('right')">▶</button>
            </div>
          </div>
        </div>

        <!-- Border -->
        <div class="ps" id="ps-brd">
          <div class="ps-h" onclick="toggleSec('ps-brd')">⬜ Borde <span id="arr-brd">▾</span></div>
          <div class="ps-b" id="pb-brd">
            <div class="pr">
              <label>Radio</label>
              <input type="range" id="bdr" min="0" max="60" value="0" oninput="applyBorder();updV('bdr-v',this.value,'px')">
              <span class="pv" id="bdr-v">0px</span>
            </div>
            <div class="pr">
              <label>Grosor</label>
              <input type="range" id="bdw" min="0" max="15" value="0" oninput="applyBorder();updV('bdw-v',this.value,'px')">
              <span class="pv" id="bdw-v">0px</span>
            </div>
            <div class="pr">
              <label>Estilo</label>
              <select id="bds" onchange="applyBorder()">
                <option value="solid">Sólido</option>
                <option value="dashed">Rayado</option>
                <option value="dotted">Punteado</option>
                <option value="double">Doble</option>
              </select>
            </div>
            <div class="pr"><label>Color</label><input type="color" id="bdc" value="#38bdf8" oninput="applyBorder()"></div>
          </div>
        </div>

        <!-- Appearance -->
        <div class="ps" id="ps-app">
          <div class="ps-h" onclick="toggleSec('ps-app')">✨ Apariencia <span id="arr-app">▾</span></div>
          <div class="ps-b" id="pb-app">
            <div class="pr">
              <label>Opacidad</label>
              <input type="range" id="opr" min="0" max="100" value="100" oninput="applyAppearance();updV('opr-v',this.value,'%')">
              <span class="pv" id="opr-v">100%</span>
            </div>
            <div class="pr">
              <label>Sombra</label>
              <input type="checkbox" id="shcb" onchange="applyAppearance()">
            </div>
            <div class="pr" id="shrow" style="display:none">
              <label>S. Color</label>
              <input type="color" id="shc" value="#000000" oninput="applyAppearance()">
            </div>
            <div class="pr">
              <label>Padding</label>
              <input type="range" id="padr" min="0" max="40" value="8" oninput="applyAppearance();updV('pad-v',this.value,'px')">
              <span class="pv" id="pad-v">8px</span>
            </div>
          </div>
        </div>

        <!-- Position & Size -->
        <div class="ps" id="ps-pos">
          <div class="ps-h" onclick="toggleSec('ps-pos')">📐 Posición y Tamaño <span id="arr-pos">▾</span></div>
          <div class="ps-b" id="pb-pos">
            <div class="pr">
              <label>X</label><input type="number" id="px" value="0" style="width:60px;flex:none" oninput="applyPos()">
              <label style="width:20px;text-align:center">Y</label><input type="number" id="py" value="0" style="width:60px;flex:none" oninput="applyPos()">
            </div>
            <div class="pr">
              <label>Ancho</label><input type="number" id="pw" value="200" style="width:60px;flex:none" oninput="applyPos()">
              <label style="width:20px;text-align:center">Alto</label><input type="number" id="ph2" value="100" style="width:60px;flex:none" oninput="applyPos()">
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div id="preview">
  <div class="pm-bar">
    <button class="tb-btn" onclick="closePreview()">✕ Cerrar</button>
    <button class="tb-btn save" onclick="doSave()">💾 Descargar HTML</button>
  </div>
  <iframe id="pf"></iframe>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ══════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════ -->
<script>
"use strict";
/* ════════════════════════
   STATE
════════════════════════ */
const canvas = document.getElementById('canvas');
const panel  = document.getElementById('panel');
const hint   = document.getElementById('canvas-hint');
const toast  = document.getElementById('toast');

let zC = 100, elN = 0, selEl = null;
let gridOn = true, snapOn = true;
const SNAP = 20;
const hist = [], MAX_H = 60;
let hIdx = -1;
let bgType = 'solid';
let toastTmr;

/* ════════════════════════
   COMPONENTS
════════════════════════ */
const COMPS = [
  { type:'nav',     label:'Navegación', icon:'☰',  cls:'c7', w:300, h:52  },

/* ════════════════════════
   ADD ELEMENT
════════════════════════ */
function addEl(comp) {
  if (elN === 0) hint.classList.add('gone');
  elN++;

  const el = document.createElement('div');
  el.className = 'el';
  el.id = 'e' + Date.now();
  el.dataset.type = comp.type;

  el.innerHTML =
    `<div class="el-ctrl">
      <button class="c-btn c-auto" data-a="auto" title="Auto-posicionar">✦</button>
      <button class="c-btn c-edit" data-a="edit" title="Editar propiedades">✏</button>
      <button class="c-btn c-dupe" data-a="dupe" title="Duplicar">⧉</button>
      <button class="c-btn c-del"  data-a="del"  title="Eliminar">✕</button>
    </div>
    <div class="el-c">${getTpl(comp.type)}</div>
    <div class="rh"></div>`;

  const cx = sn(Math.max(0, (canvas.clientWidth  - comp.w) / 2 + canvas.scrollLeft));
  const cy = sn(Math.max(0, (canvas.clientHeight - comp.h) / 2 + canvas.scrollTop));
  el.style.cssText = `left:${cx}px;top:${cy}px;width:${comp.w}px;height:${comp.h}px;z-index:${zC++}`;

  canvas.appendChild(el);
  wireCtrl(el, comp);
  initDrag(el);
  select(el);
  save();
}

function wireCtrl(el, comp) {
  el.querySelectorAll('[data-a]').forEach(btn => {
    btn.addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); });
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const a = btn.dataset.a;
      if (a === 'del')  delEl(el);
      if (a === 'edit') openPanel(el);
      if (a === 'auto') autoPos(el);
      if (a === 'dupe') dupeEl(el, comp);
    });
  });
}

function delEl(el) {
  if (selEl === el) { selEl = null; closePanel(); }
  el.remove();
  elN = Math.max(0, elN - 1);
  if (elN === 0) hint.classList.remove('gone');
  save();
}

function dupeEl(el, comp) {
  const nComp = comp || COMPS.find(c => c.type === el.dataset.type) || { type: el.dataset.type, w: el.offsetWidth, h: el.offsetHeight };
  const ne = document.createElement('div');
  ne.className = 'el';
  ne.id = 'e' + Date.now();
  ne.dataset.type = el.dataset.type;
  ne.innerHTML = `<div class="el-ctrl"><button class="c-btn c-auto" data-a="auto" title="Auto-posicionar">✦</button><button class="c-btn c-edit" data-a="edit" title="Editar">✏</button><button class="c-btn c-dupe" data-a="dupe" title="Duplicar">⧉</button><button class="c-btn c-del" data-a="del" title="Eliminar">✕</button></div><div class="el-c">${el.querySelector('.el-c').innerHTML}</div><div class="rh"></div>`;
  const nx = sn((parseInt(el.style.left)||0) + 20);
  const ny = sn((parseInt(el.style.top) ||0) + 20);
  ne.style.cssText = `left:${nx}px;top:${ny}px;width:${el.style.width};height:${el.style.height};z-index:${zC++}`;
  canvas.appendChild(ne);
  wireCtrl(ne, nComp);
  initDrag(ne);
  select(ne);
  elN++;
  save();
}

/* ════════════════════════
   SNAP HELPER
════════════════════════ */
function sn(v) { return snapOn ? Math.round(v / SNAP) * SNAP : Math.round(v); }

/* ════════════════════════
   SELECT / DESELECT
════════════════════════ */
function select(el) {
  desel();
  selEl = el;
  el.classList.add('sel');
  el.style.zIndex = zC++;
  if (panel.classList.contains('open')) loadPanel(el);
}

function desel() {
  if (selEl) { selEl.classList.remove('sel'); selEl = null; }
}

canvas.addEventListener('pointerdown', e => {
  const el = e.target.closest('.el');
  if (!el) { desel(); closePanel(); }
});

/* ════════════════════════
   DRAG & RESIZE (Pointer Events — fixes touch!)
════════════════════════ */
function initDrag(el) {
  const rh = el.querySelector('.rh');
  /* ── DRAG ── */
  let dg = false, sx, sy, sl, st;

  el.addEventListener('pointerdown', e => {
    if (e.target.dataset.a) return;           // control buttons
    if (e.target.isContentEditable) return;   // text editing
    if (e.target === rh || e.target.closest('.rh')) return;
    e.preventDefault();
    e.stopPropagation();

    dg = true;
    try { el.setPointerCapture(e.pointerId); } catch(_){}
    sx = e.clientX; sy = e.clientY;
    sl = parseInt(el.style.left)||0;
    st = parseInt(el.style.top) ||0;
    select(el);
  });

  el.addEventListener('pointermove', e => {
    if (!dg) return;
    e.preventDefault();
    let nl = sn(sl + (e.clientX - sx));
    let nt = sn(st + (e.clientY - sy));
    nl = Math.max(0, nl);
    nt = Math.max(0, nt);
    el.style.left = nl + 'px';
    el.style.top  = nt + 'px';
    if (panel.classList.contains('open') && selEl === el) {
      document.getElementById('px').value = nl;
      document.getElementById('py').value = nt;
    }
  });

  el.addEventListener('pointerup', e => {
    if (!dg) return;
    dg = false;
    try { el.releasePointerCapture(e.pointerId); } catch(_){}
    save();
  });

  el.addEventListener('pointercancel', () => { dg = false; });

  /* ── RESIZE ── */
  let rz = false, rsx, rsy, rsw, rsh;

  rh.addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    rz = true;
    try { rh.setPointerCapture(e.pointerId); } catch(_){}
    rsx = e.clientX; rsy = e.clientY;
    rsw = el.offsetWidth; rsh = el.offsetHeight;
  });

  rh.addEventListener('pointermove', e => {
    if (!rz) return;
    e.preventDefault();
    const nw = sn(Math.max(50,  rsw + (e.clientX - rsx)));
    const nh = sn(Math.max(28,  rsh + (e.clientY - rsy)));
    el.style.width  = nw + 'px';
    el.style.height = nh + 'px';
    if (panel.classList.contains('open') && selEl === el) {
      document.getElementById('pw').value  = nw;
      document.getElementById('ph2').value = nh;
    }
  });

  rh.addEventListener('pointerup', e => {
    if (!rz) return;
    rz = false;
    try { rh.releasePointerCapture(e.pointerId); } catch(_){}
    save();
  });

  rh.addEventListener('pointercancel', () => { rz = false; });
}

/* ════════════════════════
   AUTO-POSITION (✦)
════════════════════════ */
function autoPos(el) {
  const type = el.dataset.type;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;

  const presets = {
    nav:    { x:0, y:0,         w:cw, h:52  },
    header: { x:0, y:52,        w:cw, h:80  },
    hero:   { x:0, y:0,         w:cw, h:220 },
    footer: { x:0, y:ch - 78,   w:cw, h:78  },
    divider:{ x:20,y:-1,        w:cw - 40, h:22 },
  };

  if (presets[type]) {
    const p = presets[type];
    el.style.left   = p.x + 'px';
    el.style.width  = p.w + 'px';
    el.style.height = p.h + 'px';
    el.style.top    = (p.y === -1 ? stackTop(el) : p.y) + 'px';
  } else {
    el.style.left  = '20px';
    el.style.top   = stackTop(el) + 'px';
    el.style.width = (cw - 40) + 'px';
  }

  if (panel.classList.contains('open') && selEl === el) loadPanel(el);
  save();
  toast2('Elemento posicionado automáticamente ✦');
}

function stackTop(ex) {
  let bot = 20;
  canvas.querySelectorAll('.el').forEach(e => {
    if (e === ex) return;
    const b = (parseInt(e.style.top)||0) + e.offsetHeight;
    if (b > bot) bot = b;
  });
  return bot + 8;
}

/* ════════════════════════
   PROPERTIES PANEL
════════════════════════ */
function openPanel(el) {
  select(el);
  panel.classList.add('open');
  loadPanel(el);
}

function closePanel() { panel.classList.remove('open'); }
document.getElementById('ph-close').addEventListener('click', closePanel);

function toggleSec(id) {
  const b = document.getElementById('pb-' + id.replace('ps-',''));
  if (!b) return;
  const arr = id.replace('ps-','arr-');
  const isCol = b.classList.contains('collapsed');
  b.classList.toggle('collapsed', !isCol);
  const a = document.getElementById(arr);
  if (a) a.textContent = isCol ? '▾' : '▸';
}

function loadPanel(el) {
  if (!el) return;
  const cs = getComputedStyle(el);

  /* Position & Size */
  document.getElementById('px').value  = parseInt(el.style.left)  || 0;
  document.getElementById('py').value  = parseInt(el.style.top)   || 0;
  document.getElementById('pw').value  = el.offsetWidth;
  document.getElementById('ph2').value = el.offsetHeight;

  /* Border */
  const br = parseInt(cs.borderRadius)  || 0;
  const bw = parseInt(cs.borderWidth)   || 0;
  document.getElementById('bdr').value = br; updV('bdr-v', br, 'px');
  document.getElementById('bdw').value = bw; updV('bdw-v', bw, 'px');
  if (cs.borderStyle !== 'none') document.getElementById('bds').value = cs.borderStyle;

  /* Opacity */
  const op = Math.round((parseFloat(cs.opacity)||1) * 100);
  document.getElementById('opr').value = op; updV('opr-v', op, '%');

  /* Shadow */
  const hasSh = cs.boxShadow !== 'none';
  document.getElementById('shcb').checked = hasSh;
  document.getElementById('shrow').style.display = hasSh ? 'flex' : 'none';

  /* Typography */
  const te = el.querySelector('[contenteditable]');
  if (te) {
    const tcs = getComputedStyle(te);
    document.getElementById('fs').value = parseInt(tcs.fontSize) || 14;
    try { document.getElementById('tc').value = rgbHex(tcs.color); } catch(_){}
    document.getElementById('fb-b').classList.toggle('on', parseInt(tcs.fontWeight) >= 700);
    document.getElementById('fb-i').classList.toggle('on', tcs.fontStyle === 'italic');
    document.getElementById('fb-u').classList.toggle('on', tcs.textDecoration.includes('underline'));
    document.getElementById('fb-s').classList.toggle('on', tcs.textDecoration.includes('line-through'));
  }

  /* Background type detection */
  const bg = el.style.background || '';
  if (bg.includes('gradient')) setBgTypeUI('gradient');
  else if (el.style.backgroundImage && el.style.backgroundImage !== 'none') setBgTypeUI('image');
  else if (!bg || bg === 'transparent' || bg === 'none') setBgTypeUI('none');
  else { setBgTypeUI('solid'); try { document.getElementById('bg-color').value = rgbHex(cs.backgroundColor); } catch(_){} }
}

/* ── Background ── */
function setBgType(t) {
  bgType = t;
  setBgTypeUI(t);
  if (!selEl) return;
  if (t === 'none') { selEl.style.background = 'transparent'; selEl.style.backgroundImage = 'none'; }
  else if (t === 'solid') applyBgSolid();
  else if (t === 'gradient') applyGradient();
  save();
}

function setBgTypeUI(t) {
  bgType = t;
  document.querySelectorAll('#bgt-btns button').forEach(b => b.classList.toggle('on', b.dataset.bgt === t));
  document.getElementById('bgo-solid').style.display = t === 'solid'    ? 'flex' : 'none';
  document.getElementById('bgo-grad').style.display  = t === 'gradient' ? 'flex' : 'none';
  document.getElementById('bgo-img').style.display   = t === 'image'    ? 'flex' : 'none';
}

function applyBgSolid() {
  if (!selEl) return;
  selEl.style.background = document.getElementById('bg-color').value;
  selEl.style.backgroundImage = 'none';
}

function applyGradient() {
  if (!selEl) return;
  const c1 = document.getElementById('gc1').value;
  const c2 = document.getElementById('gc2').value;
  const d  = document.getElementById('gdir').value;
  selEl.style.background = `linear-gradient(${d},${c1},${c2})`;
}

function applyBgImg() {
  if (!selEl) return;
  const url = document.getElementById('bg-img').value.trim();
  if (!url) return;
  selEl.style.backgroundImage = `url('${url}')`;
  selEl.style.backgroundSize = 'cover';
  selEl.style.backgroundPosition = 'center';
  save(); toast2('Imagen de fondo aplicada');
}

/* ── Typography ── */
function applyTypo() {
  if (!selEl) return;
  const sz = document.getElementById('fs').value;
  const co = document.getElementById('tc').value;
  const ff = document.getElementById('ff').value;
  selEl.querySelectorAll('[contenteditable]').forEach(te => {
    te.style.fontSize = sz + 'px';
    te.style.color    = co;
    if (ff) te.style.fontFamily = ff;
  });
}

function togFmt(cmd) {
  if (!selEl) return;
  selEl.querySelectorAll('[contenteditable]').forEach(te => {
    const cs = getComputedStyle(te);
    if (cmd === 'bold')      te.style.fontWeight    = parseInt(cs.fontWeight) >= 700 ? 'normal' : '700';
    if (cmd === 'italic')    te.style.fontStyle     = cs.fontStyle === 'italic' ? 'normal' : 'italic';
    if (cmd === 'underline') te.style.textDecoration = cs.textDecoration.includes('underline') ? 'none' : 'underline';
    if (cmd === 'strike')    te.style.textDecoration = cs.textDecoration.includes('line-through') ? 'none' : 'line-through';
  });
  loadPanel(selEl);
  save();
}

function setAlign(a) {
  if (!selEl) return;
  selEl.querySelectorAll('[contenteditable]').forEach(te => te.style.textAlign = a);
  ['fb-al','fb-ac','fb-ar'].forEach(id => document.getElementById(id).classList.remove('on'));
  const map = {left:'fb-al',center:'fb-ac',right:'fb-ar'};
  if (map[a]) document.getElementById(map[a]).classList.add('on');
  save();
}

/* ── Border ── */
function applyBorder() {
  if (!selEl) return;
  const r = document.getElementById('bdr').value;
  const w = document.getElementById('bdw').value;
  const s = document.getElementById('bds').value;
  const c = document.getElementById('bdc').value;
  selEl.style.borderRadius = r + 'px';
  if (parseInt(w) > 0) { selEl.style.borderWidth = w + 'px'; selEl.style.borderStyle = s; selEl.style.borderColor = c; }
  else selEl.style.border = 'none';
}

/* ── Appearance ── */
function applyAppearance() {
  if (!selEl) return;
  selEl.style.opacity = document.getElementById('opr').value / 100;
  const sh = document.getElementById('shcb').checked;
  const shc = document.getElementById('shc').value;
  document.getElementById('shrow').style.display = sh ? 'flex' : 'none';
  selEl.style.boxShadow = sh ? `4px 4px 16px ${shc}55` : 'none';
  selEl.style.padding = document.getElementById('padr').value + 'px';
}

/* ── Position ── */
function applyPos() {
  if (!selEl) return;
  const x = parseInt(document.getElementById('px').value)  || 0;
  const y = parseInt(document.getElementById('py').value)  || 0;
  const w = parseInt(document.getElementById('pw').value)  || 50;
  const h = parseInt(document.getElementById('ph2').value) || 28;
  selEl.style.left   = x + 'px';
  selEl.style.top    = y + 'px';
  selEl.style.width  = w + 'px';
  selEl.style.height = h + 'px';
}

function updV(id, v, unit) { const el = document.getElementById(id); if (el) el.textContent = v + unit; }

/* ════════════════════════
   UNDO / REDO
════════════════════════ */
function save() {
  hist.splice(hIdx + 1);
  const snap = [...canvas.querySelectorAll('.el')].map(el => ({
    id: el.id, type: el.dataset.type,
    st: el.getAttribute('style'),
    ct: el.querySelector('.el-c').innerHTML,
  }));
  hist.push(JSON.stringify(snap));
  if (hist.length > MAX_H) hist.shift();
  hIdx = hist.length - 1;
  updHistBtns();
}

function restoreSnap(snap) {
  canvas.querySelectorAll('.el').forEach(e => e.remove());
  desel(); closePanel();
  const data = JSON.parse(snap);
  data.forEach(item => {
    const comp = COMPS.find(c => c.type === item.type) || { type: item.type, w: 200, h: 100 };
    const el = document.createElement('div');
    el.className = 'el';
    el.id = item.id;
    el.dataset.type = item.type;
    el.setAttribute('style', item.st);
    el.innerHTML = `<div class="el-ctrl"><button class="c-btn c-auto" data-a="auto" title="Auto-posicionar">✦</button><button class="c-btn c-edit" data-a="edit" title="Editar">✏</button><button class="c-btn c-dupe" data-a="dupe" title="Duplicar">⧉</button><button class="c-btn c-del" data-a="del" title="Eliminar">✕</button></div><div class="el-c">${item.ct}</div><div class="rh"></div>`;
    canvas.appendChild(el);
    wireCtrl(el, comp);
    initDrag(el);
  });
  elN = data.length;
  if (elN === 0) hint.classList.remove('gone');
  else hint.classList.add('gone');
  updHistBtns();
}

function undo() { if (hIdx <= 0) return; hIdx--; restoreSnap(hist[hIdx]); toast2('↩ Deshecho'); }
function redo() { if (hIdx >= hist.length - 1) return; hIdx++; restoreSnap(hist[hIdx]); toast2('↪ Rehecho'); }

function updHistBtns() {
  document.getElementById('btn-undo').disabled = hIdx <= 0;
  document.getElementById('btn-redo').disabled = hIdx >= hist.length - 1;
}

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

/* Keyboard shortcuts */
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) { e.preventDefault(); redo(); }
    if (e.key === 's') { e.preventDefault(); doSave(); }
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selEl && !document.activeElement?.isContentEditable) delEl(selEl);
  if (e.key === 'Escape') { desel(); closePanel(); }
  /* Arrow nudge */
  if (selEl && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    const step = e.shiftKey ? 20 : (snapOn ? SNAP : 1);
    const el = selEl;
    if (e.key === 'ArrowLeft')  el.style.left = (Math.max(0, parseInt(el.style.left)||0) - step) + 'px';
    if (e.key === 'ArrowRight') el.style.left = ((parseInt(el.style.left)||0) + step) + 'px';
    if (e.key === 'ArrowUp')    el.style.top  = (Math.max(0, parseInt(el.style.top)||0) - step) + 'px';
    if (e.key === 'ArrowDown')  el.style.top  = ((parseInt(el.style.top)||0) + step) + 'px';
    save();
  }
});

/* ════════════════════════
   GRID & SNAP
════════════════════════ */
document.getElementById('btn-grid').addEventListener('click', () => {
  gridOn = !gridOn;
  canvas.classList.toggle('grid', gridOn);
  document.getElementById('btn-grid').classList.toggle('on', gridOn);
});

document.getElementById('btn-snap').addEventListener('click', () => {
  snapOn = !snapOn;
  document.getElementById('btn-snap').classList.toggle('on', snapOn);
  toast2(snapOn ? '🧲 Snap activado' : '🔓 Snap desactivado');
});

/* ════════════════════════
   SAVE & PREVIEW
════════════════════════ */
function genHTML() {
  const els = canvas.querySelectorAll('.el');
  let body = '';
  els.forEach(el => {
    const s = el.style;
    const ct = el.querySelector('.el-c').innerHTML;
    body += `\n  <div style="position:absolute;left:${s.left};top:${s.top};width:${s.width};height:${s.height};${s.background?'background:'+s.background+';':''}${s.backgroundImage&&s.backgroundImage!=='none'?'background-image:'+s.backgroundImage+';background-size:cover;background-position:center;':''}${s.borderRadius?'border-radius:'+s.borderRadius+';':''}${s.border&&s.border!=='none'?'border:'+s.border+';':''}${s.opacity&&s.opacity!=='1'?'opacity:'+s.opacity+';':''}${s.boxShadow&&s.boxShadow!=='none'?'box-shadow:'+s.boxShadow+';':''}${s.padding?'padding:'+s.padding+';':''}z-index:${s.zIndex}">${ct}</div>`;
  });
  return `<!DOCTYPE html>\n<html lang="es">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Mi Página</title>\n<script src="https://cdn.tailwindcss.com"><\/script>\n<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:ui-sans-serif,system-ui,sans-serif}.page{position:relative;width:100%;min-height:100vh}</style>\n</head>\n<body>\n<div class="page">${body}\n</div>\n</body>\n</html>`;
}

function doSave() {
  const html = genHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'mi-pagina.html'; a.click();
  URL.revokeObjectURL(url);
  toast2('✅ Guardado como mi-pagina.html');
}

function openPreview() {
  document.getElementById('preview').classList.add('show');
  document.getElementById('pf').srcdoc = genHTML();
}

function closePreview() {
  document.getElementById('preview').classList.remove('show');
}

document.getElementById('btn-save').addEventListener('click', doSave);
document.getElementById('btn-prev').addEventListener('click', openPreview);

/* Close preview on background click */
document.getElementById('preview').addEventListener('click', e => {
  if (e.target === document.getElementById('preview')) closePreview();
});

/* ════════════════════════
   TOAST
════════════════════════ */
function toast2(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => toast.classList.remove('show'), 2400);
}

/* ════════════════════════
   HELPERS
════════════════════════ */
function rgbHex(rgb) {
  if (!rgb || rgb === 'transparent') return '#ffffff';
  const m = rgb.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0,3).map(n => (+n).toString(16).padStart(2,'0')).join('');
}

/* ════════════════════════
   INIT
════════════════════════ */
save(); // empty initial state
setBgTypeUI('solid');
toast2('👋 Bienvenido a WebPro — toca un componente para empezar');
</script>
